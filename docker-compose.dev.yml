# 로컬 개발용 — MySQL 컨테이너 포함
# 사용법: docker compose -f docker-compose.dev.yml up -d

services:
  db:
    image: mysql:8.0
    container_name: selfdev-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: selfdev
      MYSQL_USER: selfdev
      MYSQL_PASSWORD: selfdevpass
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql-dev-data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+09:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build: .
    container_name: selfdev-app-dev
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/selfdev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: selfdev
      SPRING_DATASOURCE_PASSWORD: selfdevpass
      JWT_SECRET: 7lsu2qBdFT197HEx+9MWSsbIPY9gHXhWqTowkrWJtZ6MWL34AhvM2bKE8arTtoNxQPy+WglaULQ0p8263bq04g==
      TZ: Asia/Seoul
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: selfdev-frontend-dev
    depends_on:
      - app
    ports:
      - "3000:80"
    volumes:
      - ./frontend/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql-dev-data:
