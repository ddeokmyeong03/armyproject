version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: selfdev-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: selfdev
      MYSQL_USER: selfdev
      MYSQL_PASSWORD: selfdevpass
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+09:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build: .
    container_name: selfdev-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/selfdev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: selfdev
      SPRING_DATASOURCE_PASSWORD: selfdevpass
      JWT_SECRET: TXlTdXBlclNlY3JldEtleUZvckFybXlEZXZTZWxmRGV2TWFuYWdlcjIwMjZQcm9kdWN0aW9u
      JWT_ACCESS_EXPIRY: 900000
      JWT_REFRESH_EXPIRY: 604800000
      TZ: Asia/Seoul
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: selfdev-frontend
    depends_on:
      - app
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  mysql-data:
